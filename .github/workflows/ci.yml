name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: token-pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: token-pipeline/pyproject.toml

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint (black check)
        run: black --check src tests

      - name: Import sort check (isort)
        run: isort --check-only src tests

      - name: Run unit tests
        run: |
          pytest tests/unit -v --tb=short --cov=src --cov-report=term-missing
        env:
          ANTHROPIC_API_KEY: ""
          GITHUB_TOKEN: ""
          DATABASE_URL: "sqlite:///:memory:"

      - name: Run integration tests
        run: |
          pytest tests/integration -v --tb=short
        env:
          ANTHROPIC_API_KEY: ""
          GITHUB_TOKEN: ""
          DATABASE_URL: "sqlite:///:memory:"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: token-pipeline:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Check if FLY_API_TOKEN is configured — skip deploy gracefully if not.
      # To enable: add FLY_API_TOKEN to repository secrets (Settings → Secrets).
      - name: Check for Fly.io token
        id: token_check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not configured — skipping deploy."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Fly CLI
        if: steps.token_check.outputs.has_token == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: steps.token_check.outputs.has_token == 'true'
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
