# fly.toml — Fly.io deployment for Token Discovery Pipeline
# Background worker (no HTTP service) — scheduled APScheduler jobs
# Free tier: shared-cpu-1x, 256MB RAM (~$0/month within free allowance)
# Docs: https://fly.io/docs/reference/configuration/

app = "token-pipeline"
primary_region = "nrt" # Tokyo — change to nearest region

[build]
dockerfile = "Dockerfile"

[env]
PIPELINE_MODE = "scheduler"
# DATABASE_URL is set via fly secrets (sqlite path mounted to /data)

[mounts]
# Persistent volume for SQLite database.
# Create before first deploy:
#   flyctl volumes create pipeline_data --size 1 --region nrt
source      = "pipeline_data"
destination = "/data"

# ── Machine sizing ─────────────────────────────────────────────────────────────
# shared-cpu-1x + 256MB fits within Fly.io free allowance.
# Upgrade to 512MB if enabling parallel chain scanning.
[[vm]]
size   = "shared-cpu-1x"
memory = "256mb"

# ── No [[services]] section ────────────────────────────────────────────────────
# This app is a pure background worker (APScheduler).
# It does NOT listen on any TCP/HTTP port, so no inbound service is needed.
# Removing [[services]] prevents Fly.io from running TCP health checks against
# a port that has nothing listening, which would cause the deployment to fail.

# ── Secrets to set via flyctl ──────────────────────────────────────────────────
# flyctl secrets set \
#   ANTHROPIC_API_KEY="sk-ant-..." \
#   GITHUB_TOKEN="ghp_..." \
#   DISCORD_WEBHOOK_URL="https://discord.com/api/webhooks/..." \
#   NOTION_API_KEY="secret_..." \
#   NOTION_DATABASE_ID="..."
