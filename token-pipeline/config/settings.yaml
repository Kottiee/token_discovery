pipeline:
  schedule: "0 */4 * * *"    # 4時間ごとに実行
  target_chains:
    - solana
    - ethereum
    - base
    - arbitrum
    - bsc

prefilter:
  min_liquidity_usd: 5000
  min_txns_24h: 10
  cooldown_minutes: 60
  max_single_wallet_share: 0.80
  min_volume_sustain_hours: 6

security:
  drop_threshold: 40

ranking:
  weights:
    security: 0.30
    fundamentals: 0.20
    narrative: 0.25
    momentum: 0.15
    community: 0.10
  top_n: 10

fundamentals:
  enabled: true

sentiment:
  enabled: true
  hot_narratives:
    - name: "AI"
      weight: 1.0
    - name: "RWA"
      weight: 0.9
    - name: "DePIN"
      weight: 0.85
    - name: "Meme"
      weight: 0.7
    - name: "GameFi"
      weight: 0.6
    - name: "DeFi"
      weight: 0.65
    - name: "L1/L2"
      weight: 0.6

notifications:
  discord_webhook_url: "${DISCORD_WEBHOOK_URL}"
  notion_api_key: "${NOTION_API_KEY}"
  notion_database_id: "${NOTION_DATABASE_ID}"

logging:
  level: "INFO"
  file: "token_pipeline.log"
  rotation: "10 MB"
  retention: 5
